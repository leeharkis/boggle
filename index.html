<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Boggle Solver</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px; }
h1 { color: #FF9900; margin-bottom: 12px; }
.container { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
.grid-section { display: flex; flex-direction: column; align-items: center; }
.grid { display: grid; gap: 5px; margin-bottom: 12px; user-select: none; }
.cell { display: flex; align-items: center; justify-content: center; font-weight: bold; text-transform: uppercase; border: 2px solid #ccc; border-radius: 8px; background: #fff; color: #333; cursor: pointer; transition: all 0.1s; }
.cell:hover { border-color: #666; }
.cell.selected { background: #FF9900; color: #000; border-color: #FF9900; }
.cell.last-selected { background: #ffcc66; color: #000; border-color: #ffcc66; }
.cell.invalid { background: #dc3545; color: #fff; border-color: #dc3545; }
.cell-input { text-align: center; font-weight: bold; text-transform: uppercase; border: 2px solid #ccc; border-radius: 8px; background: #fff; color: #333; outline: none; }
.cell-input:focus { border-color: #FF9900; }
.current-word { font-size: 24px; font-weight: bold; color: #FF9900; min-height: 36px; margin-bottom: 10px; font-family: monospace; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin: 4px; }
.btn-submit { background: #28a745; color: white; }
.btn-submit:hover { background: #2ecc71; }
.btn-undo { background: #555; color: white; }
.btn-undo:hover { background: #777; }
.btn-clear-word { background: #dc3545; color: white; }
.btn-clear-word:hover { background: #e74c3c; }
.btn-solve { background: #FF9900; color: #000; }
.btn-solve:hover { background: #ffad33; }
.btn-random { background: #6f42c1; color: #fff; }
.btn-random:hover { background: #8b5cf6; }
.btn-reset { background: #555; color: #fff; }
.btn-reset:hover { background: #777; }
.btn-edit { background: #146eb4; color: white; }
.btn-edit:hover { background: #1a8cdb; }
.buttons { margin-bottom: 10px; }
.buttons-top { margin-bottom: 10px; display: flex; gap: 8px; justify-content: center; }
.btn-row-submit { width: 100%; margin-top: 3px; margin-bottom: 6px; }
.btn-row-submit .btn-submit { width: 100%; padding: 14px; font-size: 16px; border-radius: 8px; }
.btn-row-secondary { display: flex; gap: 4px; width: 75%; margin: 0 auto 6px; }
.btn-row-secondary .btn-undo { flex: 4; }
.btn-row-secondary .btn-clear-word { flex: 4; }
.btn-row-secondary .btn-reset { flex: 2; margin-left: 8px; }
.btn-row-solve { display: flex; gap: 4px; width: 75%; margin: 0 auto 10px; margin-top: 3px; }
.btn-row-solve .btn-solve { flex: 8; }
.btn-row-solve .btn-edit { flex: 2; padding: 10px; font-size: 16px; }
.side-panel { max-width: 300px; width: 100%; }
.panel-header { font-size: 16px; font-weight: bold; color: #FF9900; margin-bottom: 8px; }
.found-list { list-style: none; max-height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px; padding: 8px; background: #fff; margin-bottom: 16px; }
.found-list li { padding: 4px 8px; font-family: monospace; font-size: 14px; border-radius: 3px; margin-bottom: 2px; }
.found-list li.valid { color: #28a745; }
.found-list li.invalid-word { color: #dc3545; text-decoration: line-through; }
</style>
<style>
.found-list li.duplicate { color: #666; text-decoration: line-through; }
.missed-section { margin-top: 16px; }
.missed-header { font-size: 16px; font-weight: bold; color: #dc3545; margin-bottom: 8px; }
.missed-list { list-style: none; max-height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px; padding: 8px; background: #fff; }
.missed-list li { padding: 3px 8px; font-family: monospace; font-size: 13px; color: #333; }
.score-box { background: #fff; border: 2px solid #FF9900; padding: 12px; border-radius: 6px; margin-bottom: 16px; text-align: center; }
.score-box .score { font-size: 28px; font-weight: bold; color: #FF9900; }
.score-box .label { font-size: 12px; color: #666; }
.status { margin: 8px 0; font-size: 13px; color: #666; }
.mode-label { font-size: 12px; color: #6f42c1; margin-bottom: 8px; font-weight: bold; }
.lang-toggle { display: flex; gap: 8px; align-items: center; }
.lang-btn { padding: 6px 14px; border: 2px solid #ccc; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; background: #fff; color: #333; transition: all 0.15s; }
.lang-btn.active { border-color: #FF9900; background: #FF9900; color: #000; }
.lang-btn:hover { border-color: #FF9900; }
.options-panel { margin-top: 12px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 0; max-width: 360px; width: 100%; }
.options-panel summary { padding: 10px 16px; font-weight: bold; font-size: 14px; cursor: pointer; color: #555; }
.options-panel[open] summary { border-bottom: 1px solid #eee; }
.options-content { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }

.option-label { font-size: 13px; color: #555; font-weight: 500; }
.switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }

        const count = dictionary.size.toLocaleString();

    } else {
        el.textContent = '';
    }
}

// === TRIE ===
class TrieNode {
    constructor() { this.children = {}; this.isWord = false; }
}
function buildTrie(words) {
    const root = new TrieNode();
    for (const word of words) {
        let node = root;
        for (const ch of word) {
            if (!node.children[ch]) node.children[ch] = new TrieNode();
            node = node.children[ch];
        }
        node.isWord = true;
    }
    return root;
}

// === LOAD DICTIONARY ===
async function loadDictionary(lang, dictMode) {
    const key = `${lang}_${dictMode}`;
    if (dictCache[key]) {
        dictionary = dictCache[key].dict;
        trie = dictCache[key].trie;
        updateDictCount();
        document.getElementById('status').textContent = '';
        return;
    }
    document.getElementById('status').textContent = '';
    try {
        const url = DICT_URLS[key];
        const resp = await fetch(url);
        const text = await resp.text();
        const maxWords = dictMode === 'buddy' ? MAX_WORDS_BUDDY : MAX_WORDS_NORMAL;
        let words = [];
        const lines = text.split('\n');
        for (const line of lines) {
            if (words.length >= maxWords) break;
            let word;
            if (lang === 'de' && dictMode === 'normal') {
                word = line.split(' ')[0].trim().toUpperCase();
            } else {
                word = line.trim().toUpperCase();
            }
            if (word.length < 3) continue;
            if (lang === 'en' && !/^[A-Z]+$/.test(word)) continue;
            if (lang === 'de' && !/^[A-ZÄÖÜ]+$/.test(word)) continue;
            words.push(word);
        }
        const newDict = new Set(words);
        const newTrie = buildTrie(words);
        dictCache[key] = { dict: newDict, trie: newTrie };
        dictionary = newDict;
        trie = newTrie;
        updateDictCount();
        document.getElementById('status').textContent = '';
    } catch (e) {
        document.getElementById('status').textContent = dictMode === 'buddy' ? t('buddyOffline') : t('dictFailed');
    }
}

// === DICT MODE SWITCH ===
function switchDictMode(dictMode) {
    if (dictMode === currentDictMode) return;
    currentDictMode = dictMode;
    document.getElementById('modeNormal').classList.toggle('active', dictMode === 'normal');
    document.getElementById('modeBuddy').classList.toggle('active', dictMode === 'buddy');
    mode = 'setup';
    foundWords = [];
    selectedPath = [];
    boardLetters = [];
    buildSetupGrid();
    showSetupUI();
    loadDictionary(currentLang, currentDictMode);
}

// === LANGUAGE SWITCH ===
function switchLanguage(lang) {
    if (lang === currentLang) return;
    currentLang = lang;
    document.getElementById('langEN').classList.toggle('active', lang === 'en');
    document.getElementById('langDE').classList.toggle('active', lang === 'de');
    updateUILanguage();
    mode = 'setup';
    foundWords = [];
    selectedPath = [];
    boardLetters = [];
    buildSetupGrid();
    showSetupUI();
    loadDictionary(lang, currentDictMode);
}

// === GRID SIZE SWITCH ===

    document.getElementById('size4').classList.toggle('active', size === 4);

    document.getElementById('size6').classList.toggle('active', size === 6);
    updateTitle();
    mode = 'setup';
    foundWords = [];
    selectedPath = [];
    boardLetters = [];
    buildSetupGrid();
    showSetupUI();
}

function updateTitle() {
    const names = { en: { 4: 'Boggle', 5: 'Big Boggle', 6: 'Super Boggle' }, de: { 4: 'Boggle', 5: 'Großes Boggle', 6: 'Super Boggle' } };
    document.getElementById('gameTitle').textContent = `🎲 ${names[currentLang][gridSize]} (${gridSize}×${gridSize})`;
}

// === GRID BUILDING ===
const gridEl = document.getElementById('grid');

function getCellSize() {
    if (gridSize === 4) return 64;
    if (gridSize === 5) return 58;
    return 48;
}

function updateGridCSS() {
    const size = getCellSize();
    gridEl.style.gridTemplateColumns = `repeat(${gridSize}, ${size}px)`;
}

function buildSetupGrid() {
    gridEl.innerHTML = '';
    updateGridCSS();
    const size = getCellSize();
    const fontSize = gridSize === 6 ? 20 : 26;
    const totalCells = gridSize * gridSize;
    for (let i = 0; i < totalCells; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'cell-input';
        input.maxLength = 2;
        input.dataset.idx = i;
        input.value = boardLetters[i] || '';
        input.style.width = size + 'px';
        input.style.height = size + 'px';
        input.style.fontSize = fontSize + 'px';
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase();
            if (e.target.value.length >= 1) {
                const next = gridEl.children[i + 1];
                if (next) next.focus();
            }
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value === '') {
                const prev = gridEl.children[i - 1];
                if (prev) prev.focus();
            }
            if (e.key === 'Enter') startPlay();
        });
        gridEl.appendChild(input);
    }
}

function buildPlayGrid() {
    gridEl.innerHTML = '';
    updateGridCSS();
    const size = getCellSize();
    const fontSize = gridSize === 6 ? 20 : 26;
    const totalCells = gridSize * gridSize;
    for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.idx = i;
        cell.textContent = boardLetters[i];
        cell.style.width = size + 'px';
        cell.style.height = size + 'px';
        cell.style.fontSize = fontSize + 'px';
        cell.addEventListener('click', () => cellClicked(i));
        gridEl.appendChild(cell);
    }
}

// === PLAY LOGIC ===
function cellClicked(idx) {
    if (mode !== 'play') return;
    if (selectedPath.includes(idx)) return;
    if (selectedPath.length > 0) {
        const last = selectedPath[selectedPath.length - 1];
        if (!getNeighbors(last).includes(idx)) return;
    }
    selectedPath.push(idx);
    updateGridHighlight();
    updateCurrentWord();
}

function getNeighbors(idx) {
    const row = Math.floor(idx / gridSize), col = idx % gridSize;
    const neighbors = [];
    for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = row + dr, nc = col + dc;
            if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) neighbors.push(nr * gridSize + nc);
        }
    }
    return neighbors;
}

function updateGridHighlight() {
    const cells = gridEl.querySelectorAll('.cell');
    cells.forEach((c, i) => {
        c.classList.remove('selected', 'last-selected');
        if (selectedPath.includes(i)) {
            c.classList.add(i === selectedPath[selectedPath.length - 1] ? 'last-selected' : 'selected');
        }
    });
}

function updateCurrentWord() {
    const word = selectedPath.map(i => boardLetters[i]).join('');
    const isValid = word.length >= 3 && dictionary.has(word);
    document.getElementById('currentWord').innerHTML = word
        ? `<span style="color:${isValid ? '#28a745' : '#333'}">${word}</span>${isValid ? ' ✓' : ''}`
        : '';
    updateHints();
}

function updateHints() {
    const hintsEl = document.getElementById('hints');
    if (!hintsEl) return;
    if (!document.getElementById('hintsToggle').checked) { hintsEl.innerHTML = ''; return; }
    if (selectedPath.length === 0 || !trie) { hintsEl.innerHTML = ''; return; }

    const currentWord = selectedPath.map(i => boardLetters[i]).join('');

    function getTrieNode(word) {
        let node = trie;
        for (const ch of word) {
            if (!node.children[ch]) return null;
            node = node.children[ch];
        }
        return node;
    }

    const startNode = getTrieNode(currentWord);
    if (!startNode) { hintsEl.innerHTML = `<span style="color:#dc3545;font-size:12px;">${t('noWords')}</span>`; return; }

    function findCompletions(idx, node, path, word, results) {
        if (results.length >= 15) return;
        if (word.length >= 3 && node.isWord) results.push(word);
        for (const n of getNeighbors(idx)) {
            if (path.includes(n)) continue;
            const letter = boardLetters[n];
            let current = node;
            let valid = true;
            for (const ch of letter) {
                if (!current.children[ch]) { valid = false; break; }
                current = current.children[ch];
            }
            if (valid) findCompletions(n, current, [...path, n], word + letter, results);
        }
    }

    const completions = [];
    const lastIdx = selectedPath[selectedPath.length - 1];
    findCompletions(lastIdx, startNode, [...selectedPath], currentWord, completions);

    if (currentWord.length >= 3 && startNode.isWord && !completions.includes(currentWord)) {
        completions.unshift(currentWord);
    }

    const unique = [...new Set(completions)].sort((a, b) => a.length - b.length || a.localeCompare(b));

    if (unique.length === 0) {
        hintsEl.innerHTML = `<span style="color:#dc3545;font-size:12px;">${t('noWords')}</span>`;
    } else {
        hintsEl.innerHTML = unique.map(w => {
            const isExact = w === currentWord;
            return `<span style="font-family:monospace;font-size:12px;padding:1px 4px;border-radius:2px;${isExact ? 'background:#28a745;color:white;' : 'color:#666;'}">${w.toLowerCase()}</span>`;
        }).join(' ');
    }
}

function clearSelection() {
    selectedPath = [];
    updateGridHighlight();
    updateCurrentWord();
    const hintsEl = document.getElementById('hints');
    if (hintsEl) hintsEl.innerHTML = '';
}

function undoLast() {
    selectedPath.pop();
    updateGridHighlight();
    updateCurrentWord();
}

function submitWord() {
    const word = selectedPath.map(i => boardLetters[i]).join('');
    if (word.length < 3) { return; }
    if (foundWords.includes(word)) { return; }
    foundWords.push(word);
    updateFoundList();
    clearSelection();
}

function updateFoundList() {
    const list = document.getElementById('foundList');
    list.innerHTML = '';
    foundWords.forEach(w => {
        const li = document.createElement('li');
        li.textContent = w.toLowerCase();
        list.appendChild(li);
    });
    document.getElementById('foundCount').textContent = foundWords.length;
    document.getElementById('yourScore').textContent = foundWords.reduce((s, w) => s + scoreWord(w), 0);
}

function scoreWord(word) {
    const len = word.length;
    if (len <= 4) return 1;
    if (len === 5) return 2;
    if (len === 6) return 3;
    if (len === 7) return 5;
    return 11;
}

// === START PLAY ===
function startPlay() {
    boardLetters = [];
    const totalCells = gridSize * gridSize;
    for (let i = 0; i < totalCells; i++) {
        const val = gridEl.children[i].value.toUpperCase();
        if (!val) { alert(t('fillAll')); return; }
        boardLetters.push(val);
    }
    mode = 'play';
    foundWords = [];
    selectedPath = [];
    buildPlayGrid();
    showPlayUI();
    updateFoundList();
}

// === SOLVE ===
function solveBoard() {
    if (!trie) { alert(t('dictNotLoaded')); return; }
    mode = 'solved';
    const allWords = new Set();

    function dfs(idx, node, path, word) {
        const letter = boardLetters[idx];
        let current = node;
        for (const ch of letter) {
            if (!current.children[ch]) return;
            current = current.children[ch];
        }
        const newWord = word + letter;
        const newPath = [...path, idx];
        if (newWord.length >= 3 && current.isWord) allWords.add(newWord);
        for (const n of getNeighbors(idx)) {
            if (!newPath.includes(n)) dfs(n, current, newPath, newWord);
        }
    }
    for (let i = 0; i < gridSize * gridSize; i++) dfs(i, trie, [], '');

    const validFound = [];
    const invalidFound = [];
    foundWords.forEach(w => {
        if (allWords.has(w)) validFound.push(w);
        else invalidFound.push(w);
    });

    const missed = [...allWords].filter(w => !foundWords.includes(w)).sort((a, b) => b.length - a.length || a.localeCompare(b));

    const list = document.getElementById('foundList');
    list.innerHTML = '';
    foundWords.forEach(w => {
        const li = document.createElement('li');
        li.textContent = w.toLowerCase();
        li.className = allWords.has(w) ? 'valid' : 'invalid-word';
        list.appendChild(li);
    });

    const missedList = document.getElementById('missedList');
    missedList.innerHTML = '';
    missed.forEach(w => {
        const li = document.createElement('li');
        li.textContent = w.toLowerCase();
        missedList.appendChild(li);
    });
    document.getElementById('missedCount').textContent = missed.length;
    document.getElementById('missedSection').style.display = '';

    document.getElementById('yourScore').textContent = validFound.reduce((s, w) => s + scoreWord(w), 0);

    showSolvedUI();
    document.getElementById('status').textContent = t('solved')(validFound.length, allWords.size) + ' — ' + t('solvedStatus')(validFound.length, invalidFound.length, missed.length, allWords.size);
}

// === RANDOM BOARD ===
function randomBoard() {
    const dice = DICE[currentLang][gridSize];
    const shuffled = [...dice].sort(() => Math.random() - 0.5);
    const totalCells = gridSize * gridSize;
    boardLetters = [];
    for (let i = 0; i < totalCells; i++) {
        const die = shuffled[i];
        const face = die[Math.floor(Math.random() * 6)];
        boardLetters.push(face);
    }
    mode = 'play';
    foundWords = [];
    selectedPath = [];
    buildPlayGrid();
    showPlayUI();
    updateFoundList();
}

// === EDIT / RESET ===
function editBoard() {
    mode = 'setup';
    buildSetupGrid();
    showSetupUI();
}

function resetGame() {
    foundWords = [];
    selectedPath = [];
    mode = 'play';
    buildPlayGrid();
    updateFoundList();
    showPlayUI();
}

// === EVENTS ===
document.getElementById('submitBtn').addEventListener('click', submitWord);
document.getElementById('undoBtn').addEventListener('click', undoLast);
document.getElementById('clearWordBtn').addEventListener('click', clearSelection);
document.getElementById('solveBtn').addEventListener('click', solveBoard);
document.getElementById('randomBtn').addEventListener('click', randomBoard);
document.getElementById('editBtn').addEventListener('click', editBoard);
document.getElementById('resetBtn').addEventListener('click', resetGame);

document.addEventListener('keydown', (e) => {
    if (mode === 'play' && e.key === 'Enter') submitWord();
    if (mode === 'play' && e.key === 'Backspace') undoLast();
    if (mode === 'play' && e.key === 'Escape') clearSelection();
});

// === INIT ===
buildSetupGrid();
loadDictionary('en', 'normal');

// === SERVICE WORKER (offline support) ===
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then((reg) => {
        console.log('Service worker registered — Normal mode works offline after first load.');
    }).catch((err) => {
        console.log('Service worker not available:', err);
    });
}
